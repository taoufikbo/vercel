<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill Maps — Transformation Telco Cloud</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;0,700;1,300&display=swap');
  :root {
    --bg:#0A0C10;--surface:#111318;--surface2:#181C24;--border:#1E2433;
    --red:#CC2936;--red-dim:#7A1520;--cyan:#00B4D8;--cyan-dim:#004D5E;
    --gold:#F5A623;--green:#3FB950;--purple:#8B5CF6;
    --text:#CDD9E5;--text-dim:#636E7B;--text-bright:#F0F4F8;
    --vendor:#E85D6A;--operator:#3FB950;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;line-height:1.6;min-height:100vh}

  /* ── Header ── */
  header{border-bottom:1px solid var(--border);padding:18px 32px 14px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px;position:sticky;top:0;background:var(--bg);z-index:100}
  .header-left h1{font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;color:var(--cyan);letter-spacing:.08em;text-transform:uppercase}
  .header-left p{font-size:11px;color:var(--text-dim);margin-top:2px;font-style:italic}
  .legend{display:flex;gap:16px;align-items:center;flex-wrap:wrap;font-size:11px;color:var(--text-dim);padding-top:2px}
  .legend-item{display:flex;align-items:center;gap:5px}
  .legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

  /* ── Layout ── */
  .app{display:grid;grid-template-columns:210px 1fr;min-height:calc(100vh - 65px)}
  nav{border-right:1px solid var(--border);padding:12px 0;position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto}
  .nav-group-title{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);padding:10px 14px 5px}
  .nav-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;border-left:2px solid transparent;transition:all .15s;font-size:12px;color:var(--text-dim)}
  .nav-item:hover{color:var(--text-bright);background:var(--surface)}
  .nav-item.active{color:var(--text-bright);border-left-color:var(--cyan);background:var(--surface)}
  .nav-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
  main{padding:28px 32px;overflow-y:auto}

  /* ── Card & tabs ── */
  .role-card{display:none;animation:fadeIn .2s ease}
  .role-card.visible{display:block}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

  /* ── Tab bar ── */
  .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:24px}
  .tab-btn{padding:8px 20px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;color:var(--text-dim);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;background:none;border-top:none;border-left:none;border-right:none}
  .tab-btn:hover{color:var(--text-bright)}
  .tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan)}
  .tab-pane{display:none}
  .tab-pane.active{display:block;animation:fadeIn .15s ease}

  /* ── Role header ── */
  .role-header{margin-bottom:20px}
  .role-layer{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px}
  .role-title{font-size:24px;font-weight:700;color:var(--text-bright);line-height:1.2;margin-bottom:6px}
  .role-subtitle{font-size:12px;color:var(--text-dim);font-style:italic;max-width:680px}

  /* ── PI shift ── */
  .pi-shift{display:inline-flex;align-items:center;gap:8px;background:rgba(204,41,54,.12);border:1px solid var(--red-dim);border-radius:4px;padding:5px 10px;font-size:11px;color:var(--vendor);margin-bottom:20px;flex-wrap:wrap}
  .pi-shift .to{color:var(--operator)}

  /* ── Delta ── */
  .delta-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
  .delta-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:12px 14px;text-align:center}
  .delta-number{font-family:'IBM Plex Mono',monospace;font-size:26px;font-weight:600;line-height:1;margin-bottom:3px}
  .delta-label{font-size:10px;color:var(--text-dim)}

  /* ── Skills grid ── */
  .skills-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
  .skills-col{background:var(--surface);border:1px solid var(--border);border-radius:6px;overflow:hidden}
  .skills-col-header{padding:9px 14px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;display:flex;align-items:center;gap:7px}
  .col-before .skills-col-header{background:rgba(204,41,54,.08);border-bottom:1px solid var(--red-dim);color:var(--vendor)}
  .col-after .skills-col-header{background:rgba(63,185,80,.08);border-bottom:1px solid rgba(63,185,80,.3);color:var(--operator)}
  .skill-list{padding:10px 0;list-style:none}
  .skill-item{padding:5px 14px;display:flex;align-items:flex-start;gap:9px;font-size:12px}
  .skill-item:hover{background:var(--surface2)}
  .skill-level{width:28px;height:3px;border-radius:2px;margin-top:7px;flex-shrink:0}
  .skill-name{flex:1;color:var(--text)}
  .skill-tag{font-size:9px;padding:1px 5px;border-radius:3px;font-family:'IBM Plex Mono',monospace;flex-shrink:0;margin-top:2px}
  .tag-core{background:rgba(0,180,216,.15);color:var(--cyan)}
  .tag-new{background:rgba(63,185,80,.15);color:var(--green)}
  .tag-drop{background:rgba(204,41,54,.15);color:var(--vendor);text-decoration:line-through}
  .tag-up{background:rgba(245,166,35,.15);color:var(--gold)}

  /* ── Transfer ── */
  .transfer-block{background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--red);border-radius:6px;padding:14px 18px;margin-bottom:18px}
  .transfer-block h3{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--vendor);margin-bottom:10px}
  .transfer-items{display:flex;flex-wrap:wrap;gap:7px}
  .transfer-item{background:rgba(204,41,54,.08);border:1px solid var(--red-dim);border-radius:4px;padding:4px 9px;font-size:11px;color:var(--text);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .from-label{font-size:9px;color:var(--vendor);font-family:'IBM Plex Mono',monospace}
  .to-label{font-size:9px;color:var(--operator);font-family:'IBM Plex Mono',monospace}

  /* ── Posture ── */
  .posture-block{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:14px 18px;font-size:12px;color:var(--text-dim);font-style:italic;line-height:1.7}
  .posture-block strong{color:var(--text);font-style:normal}

  /* ── Radar tab ── */
  .radar-wrapper{display:flex;gap:32px;align-items:flex-start;flex-wrap:wrap}
  .radar-svg-container{flex-shrink:0}
  .radar-legend{flex:1;min-width:240px}
  .radar-legend-title{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:12px}
  .radar-axis-list{list-style:none;display:flex;flex-direction:column;gap:10px}
  .radar-axis-item{display:flex;align-items:center;gap:10px;font-size:12px}
  .radar-axis-num{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--text-dim);width:18px;text-align:right;flex-shrink:0}
  .radar-axis-name{flex:1;color:var(--text)}
  .radar-bar-wrap{width:100px;height:6px;background:var(--border);border-radius:3px;flex-shrink:0;position:relative}
  .radar-bar-before{height:6px;border-radius:3px 0 0 3px;background:var(--vendor);opacity:.7;position:absolute;top:0;left:0}
  .radar-bar-after{height:6px;border-radius:3px;background:var(--operator);position:absolute;top:0;left:0}
  .radar-vals{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--text-dim);white-space:nowrap}
  .radar-key{display:flex;gap:20px;margin-top:20px;font-size:11px}
  .radar-key-item{display:flex;align-items:center;gap:7px}
  .radar-key-line{width:24px;height:3px;border-radius:2px}

  /* ── Scrollbar ── */
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

// ── Radar SVG ──────────────────────────────────────────────────────────────
function buildRadar(r, roleColor) {
  const SIZE = 280, CX = 140, CY = 140, R = 110;
  const N = r.axes.length;
  const angles = r.axes.map((_, i) => (Math.PI * 2 * i / N) - Math.PI / 2);

  function pt(val, i) {
    const a = angles[i], rv = (val / 5) * R;
    return [CX + rv * Math.cos(a), CY + rv * Math.sin(a)];
  }

  // Grid rings
  let rings = '';
  for (let lvl = 1; lvl <= 5; lvl++) {
    const pts = angles.map((a) => {
      const rv = (lvl / 5) * R;
      return `${CX + rv * Math.cos(a)},${CY + rv * Math.sin(a)}`;
    }).join(' ');
    rings += `<polygon points="${pts}" fill="none" stroke="#1E2433" stroke-width="${lvl===5?1.5:0.8}"/>`;
  }

  // Axis lines
  let axisLines = '';
  angles.forEach(a => {
    axisLines += `<line x1="${CX}" y1="${CY}" x2="${CX + R * Math.cos(a)}" y2="${CY + R * Math.sin(a)}" stroke="#1E2433" stroke-width="0.8"/>`;
  });

  // Before polygon
  const bPts = r.before.map((v, i) => pt(v, i).join(',')).join(' ');
  // After polygon
  const aPts = r.after.map((v, i) => pt(v, i).join(',')).join(' ');

  // Axis labels
  let labels = '';
  r.axes.forEach((ax, i) => {
    const a = angles[i];
    const lx = CX + (R + 18) * Math.cos(a);
    const ly = CY + (R + 18) * Math.sin(a);
    const anchor = Math.cos(a) > 0.1 ? 'start' : Math.cos(a) < -0.1 ? 'end' : 'middle';
    labels += `<text x="${lx}" y="${ly}" text-anchor="${anchor}" dominant-baseline="middle" font-size="9" font-family="IBM Plex Mono,monospace" fill="#8B949E">${ax}</text>`;
  });

  // Dots on after
  let dots = '';
  r.after.forEach((v, i) => {
    const [dx, dy] = pt(v, i);
    dots += `<circle cx="${dx}" cy="${dy}" r="3" fill="${roleColor}" opacity="0.9"/>`;
  });

  return `<svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}" xmlns="http://www.w3.org/2000/svg">
    <rect width="${SIZE}" height="${SIZE}" fill="#111318" rx="6"/>
    ${rings}${axisLines}
    <polygon points="${bPts}" fill="rgba(232,93,106,0.12)" stroke="#E85D6A" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="${aPts}" fill="${roleColor}22" stroke="${roleColor}" stroke-width="2"/>
    ${dots}${labels}
  </svg>`;
}

// ── Render functions ──────────────────────────────────────────────────────
const TAG_LABELS = {core:"CORE",new:"NOUVEAU",drop:"RECUL",up:"↑ MONTANT"};
const lvlColors  = {core:'#00B4D8',new:'#3FB950',drop:'#CC2936',up:'#F5A623'};

function skillRow(s) {
  return `<li class="skill-item">
    <div class="skill-level" style="background:${lvlColors[s.tag]||'#636E7B'}"></div>
    <span class="skill-name">${s.name}</span>
    <span class="skill-tag tag-${s.tag}">${TAG_LABELS[s.tag]}</span>
  </li>`;
}

function renderCard(role) {
  const transferItems = role.vendorTransfer.map(t => `
    <div class="transfer-item">
      <span>${t.resp}</span>
      <span class="from-label">${t.from}</span>
      <span style="color:#636E7B;font-size:11px">→</span>
      <span class="to-label">${t.to}</span>
    </div>`).join('');

  const radarSvg = buildRadar(role.radar, role.color);

  const radarAxisRows = role.radar.axes.map((ax, i) => {
    const bw = Math.round((role.radar.before[i]/5)*100);
    const aw = Math.round((role.radar.after[i]/5)*100);
    return `<li class="radar-axis-item">
      <span class="radar-axis-num">${i+1}</span>
      <span class="radar-axis-name">${ax}</span>
      <div class="radar-bar-wrap">
        <div class="radar-bar-before" style="width:${bw}%"></div>
        <div class="radar-bar-after" style="width:${aw}%;opacity:0.85"></div>
      </div>
      <span class="radar-vals">${role.radar.before[i]}/5 → ${role.radar.after[i]}/5</span>
    </li>`;
  }).join('');

  return `<div class="role-card" id="card-${role.id}">
    <div class="role-header">
      <div class="role-layer">${role.group}</div>
      <h2 class="role-title">${role.title}</h2>
      <p class="role-subtitle">${role.subtitle}</p>
    </div>
    <div class="pi-shift">
      <span style="font-size:10px;font-family:'IBM Plex Mono',monospace;letter-spacing:.08em">PRIME INTEGRATOR SHIFT</span>
      <span style="color:#636E7B">→</span>
      <span class="to">${role.piShift}</span>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('${role.id}','detail',this)">Détail compétences</button>
      <button class="tab-btn" onclick="switchTab('${role.id}','radar',this)">Radar avant / après</button>
    </div>

    <!-- DETAIL PANE -->
    <div class="tab-pane active" id="tab-${role.id}-detail">
      <div class="delta-row">
        <div class="delta-card">
          <div class="delta-number" style="color:#3FB950">${role.delta.new}</div>
          <div class="delta-label">Compétences nouvelles</div>
        </div>
        <div class="delta-card">
          <div class="delta-number" style="color:#F5A623">${role.delta.up}</div>
          <div class="delta-label">Compétences montantes</div>
        </div>
        <div class="delta-card">
          <div class="delta-number" style="color:#CC2936">${role.delta.drop}</div>
          <div class="delta-label">Compétences en recul</div>
        </div>
      </div>
      <div class="skills-grid">
        <div class="skills-col col-before">
          <div class="skills-col-header">⬛ Monde VNF / Avant</div>
          <ul class="skill-list">${role.before.map(skillRow).join('')}</ul>
        </div>
        <div class="skills-col col-after">
          <div class="skills-col-header">▶ Monde CNF / Après</div>
          <ul class="skill-list">${role.after.map(skillRow).join('')}</ul>
        </div>
      </div>
      <div class="transfer-block">
        <h3>Responsabilités transférées du vendor vers l'opérateur</h3>
        <div class="transfer-items">${transferItems}</div>
      </div>
      <div class="posture-block">${role.posture}</div>
    </div>

    <!-- RADAR PANE -->
    <div class="tab-pane" id="tab-${role.id}-radar">
      <div class="radar-wrapper">
        <div class="radar-svg-container">${radarSvg}</div>
        <div class="radar-legend">
          <div class="radar-legend-title">Axes de compétence — scores /5</div>
          <ul class="radar-axis-list">${radarAxisRows}</ul>
          <div class="radar-key">
            <div class="radar-key-item">
              <div class="radar-key-line" style="background:#E85D6A;opacity:.7"></div>
              <span style="color:#E85D6A">Avant (VNF)</span>
            </div>
            <div class="radar-key-item">
              <div class="radar-key-line" style="background:${role.color}"></div>
              <span style="color:${role.color}">Après (CNF)</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function switchTab(roleId, pane, btn) {
  const card = document.getElementById('card-' + roleId);
  card.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  card.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + roleId + '-' + pane).classList.add('active');
  btn.classList.add('active');
}

function renderNav() {
  const sidebar = document.getElementById('sidebar');
  let html = '', lastGroup = '';
  ROLES.forEach((r, i) => {
    if (r.group !== lastGroup) {
      html += `<div class="nav-group-title">${r.group}</div>`;
      lastGroup = r.group;
    }
    html += `<div class="nav-item${i===0?' active':''}" onclick="showRole('${r.id}',this)">
      <div class="nav-dot" style="background:${r.color}"></div>
      <span>${r.title}</span>
    </div>`;
  });
  sidebar.innerHTML = html;
}

function showRole(id, el) {
  document.querySelectorAll('.role-card').forEach(c => c.classList.remove('visible'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('card-' + id).classList.add('visible');
  el.classList.add('active');
}

function init() {
  renderNav();
  document.getElementById('content').innerHTML = ROLES.map(renderCard).join('');
  document.getElementById('card-' + ROLES[0].id).classList.add('visible');
}

init();
</script>
